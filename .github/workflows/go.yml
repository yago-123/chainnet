name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  main-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise tools
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Generate protobuf files
        run: make protobuf

      - name: Run golangci-lint
        run: make lint

      - name: Build Node
        run: make node

      - name: Build Miner
        run: make miner

      - name: Build NESPV
        run: make nespv
      
      - name: Build CLI
        run: make cli

      - name: Test code
        run: make test

  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: main-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Install mise tools
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and publish images
        run: make push DOCKER=docker IMAGE_REPOSITORY=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest
